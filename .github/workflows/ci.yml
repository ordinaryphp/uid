name: CI

# Shared CI pipeline for OrdinaryPHP split repositories.
# Managed centrally in ordinaryphp/ordinary-src — do not edit this file directly.
# Changes made to .github/shared-pipelines/ci.yml in the monorepo are
# automatically synced here by the sync-pipelines workflow on every push to main.
#
# Scope: PHPUnit tests only.
# Static analysis, code style, and Rector enforcement run exclusively in the
# monorepo CI pipeline — there is no value in running them twice.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, intl
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Tests
        run: vendor/bin/phpunit
